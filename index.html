<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Alan Cheramy</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    iframe{position:fixed;top:0;left:0;width:100%;height:100%;border:none;transition:opacity .3s ease;}
    iframe.hidden{opacity:0;pointer-events:none;position:absolute;}
    iframe.active{opacity:1;pointer-events:all;position:fixed;}
  </style>
</head>
<body>

<iframe id="f-accueil"    src="accueil.html"    class="active"></iframe>
<iframe id="f-experience" src="experience.html" class="hidden"></iframe>
<iframe id="f-education"  src="education.html"  class="hidden"></iframe>
<iframe id="f-skills"     src="skills.html"     class="hidden"></iframe>
<iframe id="f-contact"    src="contact.html"    class="hidden"></iframe>

<script>
  const frames = {
    'accueil.html':    document.getElementById('f-accueil'),
    'experience.html': document.getElementById('f-experience'),
    'education.html':  document.getElementById('f-education'),
    'skills.html':     document.getElementById('f-skills'),
    'contact.html':    document.getElementById('f-contact'),
  };

  const order = ['accueil.html','experience.html','education.html','skills.html','contact.html'];
  let current = 'accueil.html';

  function showPage(page) {
    if (!frames[page] || page === current) return;
    frames[current].className = 'hidden';
    frames[page].className = 'active';
    // Scroll en haut de la page cible
    try { frames[page].contentWindow.scrollTo(0,0); } catch(e){}
    current = page;
    // Mettre à jour l'URL sans rechargement
    history.pushState({page}, '', '#' + page.replace('.html',''));
  }

  // Intercepter tous les clics sur les liens dans les iframes
  Object.entries(frames).forEach(([name, frame]) => {
    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument;

        // Intercepter les liens nav
        doc.querySelectorAll('a[href]').forEach(a => {
          const href = a.getAttribute('href');
          if (frames[href]) {
            a.addEventListener('click', e => {
              e.preventDefault();
              showPage(href);
            });
          }
        });

        // Détecter le scroll en bas → page suivante
        const idx = order.indexOf(name);
        const nextPage = order[(idx + 1) % order.length];
        frame.contentWindow.addEventListener('scroll', () => {
          const win = frame.contentWindow;
          const doc2 = frame.contentDocument.documentElement;
          const atBottom = win.scrollY + win.innerHeight >= doc2.scrollHeight - 5;
          if (atBottom && !frame._going) {
            frame._going = true;
            // Montrer la barre de transition
            try {
              const bar = frame.contentDocument.getElementById('next-bar');
              if (bar) bar.classList.add('show');
            } catch(e){}
            setTimeout(() => {
              showPage(nextPage);
              frame._going = false;
            }, 700);
          }
        });

      } catch(e) { console.log('iframe load error', e); }
    });
  });

  // Gérer le bouton retour navigateur
  window.addEventListener('popstate', e => {
    if (e.state && e.state.page) showPage(e.state.page);
  });
</script>
</body>
</html>
